spring:
  application:
    name: sionic
  config:
    import: optional:classpath:application-secret.properties
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    show-sql: false
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

ai:
  api-key: ${OPENAI_API_KEY:${AI_API_KEY}}
  base-url: ${OPENAI_BASE_URL:${AI_BASE_URL:https://api.openai.com}}
  model: ${OPENAI_MODEL:${AI_MODEL:gpt-5.4}}
